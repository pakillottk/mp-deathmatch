# /etc/nginx/sites-available/deathmatch
# Configuracion Nginx para VPS Hetzner (Opcion B)
# Certbot + Let's Encrypt: sudo certbot --nginx -d tudominio.com

server {
    listen 80;
    server_name tudominio.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name tudominio.com;

    ssl_certificate     /etc/letsencrypt/live/tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tudominio.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Proxy WebSocket al servidor Colyseus
    location / {
        proxy_pass         http://localhost:2567;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;   # Mantener conexiones WS largas
        proxy_send_timeout 86400s;
    }
}
